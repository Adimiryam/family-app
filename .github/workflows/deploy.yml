name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: שליפת נתוני אזעקות עדכניים
        run: |
          git fetch origin alerts-data 2>/dev/null || true
          git checkout origin/alerts-data -- data/ 2>/dev/null || true
          ls data/*.json 2>/dev/null && cp data/*.json public/data/ && echo "✅ data copied" || echo "⚠️ no data yet"

      - run: npm ci

      - name: Build with shared state token
        run: npm run build
        env:
          VITE_GT: ${{ secrets.SHARED_STATE_TOKEN }}

      - name: פריסה ל-gh-pages
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy $(date -u '+%Y-%m-%d %H:%M')"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Adimiryam/family-app.git" \
            HEAD:gh-pages
