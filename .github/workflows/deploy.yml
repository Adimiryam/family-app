name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: שליפת נתוני אזעקות
        run: node scripts/fetch-alerts.mjs || true

      - name: העתקת נתונים ל-public
        run: ls data/*.json 2>/dev/null && cp data/*.json public/data/ || true

      - run: npm ci
      - run: npm run build

      - name: Deploy to gh-pages
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Adimiryam/family-app.git" HEAD:gh-pages
