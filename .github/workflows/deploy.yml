name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: שליפת נתוני אזעקות מ-data branch
        run: |
          git fetch origin alerts-data 2>/dev/null || git fetch origin gh-pages 2>/dev/null || true
          git checkout origin/alerts-data -- data/ 2>/dev/null || git checkout origin/gh-pages -- data/ 2>/dev/null || true
          ls data/*.json 2>/dev/null && cp data/*.json public/data/ && echo "✅ data files copied" || echo "⚠️ no data yet"

      - run: npm ci
      - run: npm run build

      - name: הגדרת GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: העלאת artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: פריסה ל-GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
