name: Fetch Alert Data

on:
  schedule:
    - cron: '*/5 * * * *'   # כל 5 דקות
  workflow_dispatch:          # אפשרות הרצה ידנית

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: שליפת נתוני אזעקות
        run: node scripts/fetch-alerts.mjs

      - name: העתקה ל-public/data וקומיט
        run: |
          cp data/*.json public/data/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "🔄 עדכון נתוני אזעקות $(date -u '+%H:%M UTC')"
          git push
