name: Fetch Alert Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup alerts-data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin alerts-data 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/alerts-data; then
            git checkout alerts-data
          else
            echo "Creating orphan alerts-data branch"
            git checkout --orphan alerts-data
            git rm -rf . --quiet 2>/dev/null || true
          fi
          mkdir -p data

      - name: Fetch alerts via proxy
        run: |
          node -e "
          const fs = require('fs');

          const PROXIES = [
            url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
            url => 'https://corsproxy.io/?' + encodeURIComponent(url),
            url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
          ];

          const OREF_HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
            'Referer': 'https://www.oref.org.il/',
            'X-Requested-With': 'XMLHttpRequest',
            'Accept': 'application/json',
          };

          async function fetchWithProxy(url) {
            // Try direct first
            try {
              const r = await fetch(url, { headers: OREF_HEADERS, signal: AbortSignal.timeout(10000) });
              if (r.ok) {
                const text = await r.text();
                if (text && text.length > 2) {
                  const data = JSON.parse(text);
                  console.log('DIRECT OK:', url.split('?')[0], '|', String(text).slice(0, 80));
                  return data;
                }
              }
            } catch (e) { console.log('DIRECT FAIL:', url.split('?')[0], e.message); }

            // Try proxies
            for (const proxy of PROXIES) {
              try {
                const proxyUrl = proxy(url);
                const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(15000) });
                if (!r.ok) continue;
                const text = await r.text();
                if (!text || text.length < 3) continue;
                const data = JSON.parse(text);
                console.log('PROXY OK:', url.split('?')[0], '|', String(text).slice(0, 80));
                return data;
              } catch (e) { console.log('PROXY FAIL:', e.message); continue; }
            }
            console.log('ALL FAILED:', url.split('?')[0]);
            return null;
          }

          function dt(d) {
            return [String(d.getDate()).padStart(2,'0'), String(d.getMonth()+1).padStart(2,'0'), d.getFullYear()].join('.');
          }

          const now = new Date();
          const yd = new Date(now - 864e5);
          const wk = new Date(now - 6 * 864e5);

          (async () => {
            console.log('=== Fetching alerts at', now.toISOString(), '===');

            // Current alert
            const cur = await fetchWithProxy('https://www.oref.org.il/warningMessages/alert/Alerts.json');
            const hasCurrent = cur && cur?.data && cur.data.length > 0;
            fs.writeFileSync('data/current.json', JSON.stringify(hasCurrent ? cur : null));
            console.log('current:', hasCurrent ? 'ACTIVE ALERT' : 'no alert');

            // Today (last 24h)
            const hist = await fetchWithProxy('https://www.oref.org.il/warningMessages/alert/History/AlertsHistory.json');
            const todayArr = Array.isArray(hist) ? hist : [];
            fs.writeFileSync('data/today.json', JSON.stringify(todayArr));
            console.log('today:', todayArr.length, 'records');

            // Yesterday
            const y = await fetchWithProxy(
              'https://alerts-history.oref.org.il/Shared/Ajax/GetAlarmsHistory.aspx?lang=he&fromDate=' + dt(yd) + '&toDate=' + dt(yd) + '&mode=0'
            );
            const yesterdayArr = Array.isArray(y) ? y : [];
            fs.writeFileSync('data/yesterday.json', JSON.stringify(yesterdayArr));
            console.log('yesterday:', yesterdayArr.length, 'records');

            // Week
            const w = await fetchWithProxy(
              'https://alerts-history.oref.org.il/Shared/Ajax/GetAlarmsHistory.aspx?lang=he&fromDate=' + dt(wk) + '&toDate=' + dt(now) + '&mode=0'
            );
            const weekArr = Array.isArray(w) ? w : [];
            fs.writeFileSync('data/week.json', JSON.stringify(weekArr));
            console.log('week:', weekArr.length, 'records');

            // Since war start
            const sw = await fetchWithProxy(
              'https://alerts-history.oref.org.il/Shared/Ajax/GetAlarmsHistory.aspx?lang=he&fromDate=28.02.2026&toDate=' + dt(now) + '&mode=0'
            );
            const sinceWarArr = Array.isArray(sw) ? sw : [];
            fs.writeFileSync('data/sincewar.json', JSON.stringify(sinceWarArr));
            console.log('sincewar:', sinceWarArr.length, 'records');

            // Metadata
            fs.writeFileSync('data/meta.json', JSON.stringify({
              lastUpdate: now.toISOString(),
              counts: {
                today: todayArr.length,
                yesterday: yesterdayArr.length,
                week: weekArr.length,
                sinceWar: sinceWarArr.length,
              }
            }, null, 2));

            console.log('=== Done ===');
          })().then(() => process.exit(0)).catch(e => { console.error(e); process.exit(0); });
          "

      - name: Push data to alerts-data branch
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 alerts $(date -u '+%Y-%m-%d %H:%M')"
            git push origin alerts-data || git push --set-upstream origin alerts-data
          fi
