name: Fetch Alert Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch-alerts.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup alerts-data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin alerts-data 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/alerts-data; then
            git checkout alerts-data
          else
            echo "Creating orphan alerts-data branch"
            git checkout --orphan alerts-data
            git rm -rf . --quiet 2>/dev/null || true
          fi
          mkdir -p data

      - name: Fetch and accumulate alerts
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');

          const TZEVA_ADOM_HISTORY = 'https://api.tzevaadom.co.il/alerts-history';
          const OREF_HISTORY = 'https://www.oref.org.il//Shared/Ajax/GetAlarmsHistory.aspx';
          const OREF_CURRENT = 'https://www.oref.org.il/warningMessages/alert/Alerts.json';

          const PROXIES = [
            url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
            url => 'https://corsproxy.io/?' + encodeURIComponent(url),
            url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
          ];

          const OREF_HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
            'Referer': 'https://www.oref.org.il/',
            'X-Requested-With': 'XMLHttpRequest',
            'Accept': 'application/json',
          };

          async function tryFetch(url, opts = {}) {
            try {
              const r = await fetch(url, { signal: AbortSignal.timeout(opts.timeout || 12000), ...opts });
              if (!r.ok) return null;
              const text = await r.text();
              if (!text || text.length < 2) return null;
              return JSON.parse(text);
            } catch (e) { return null; }
          }

          async function fetchWithProxy(url) {
            const direct = await tryFetch(url, { headers: OREF_HEADERS });
            if (direct) { console.log('DIRECT OK:', url.split('?')[0]); return direct; }
            for (const proxy of PROXIES) {
              const data = await tryFetch(proxy(url), { timeout: 15000 });
              if (data) { console.log('PROXY OK:', url.split('?')[0]); return data; }
            }
            return null;
          }

          // Flatten nested tzevaadom format
          function flattenTzeva(items) {
            if (!Array.isArray(items)) return [];
            const flat = [];
            for (const group of items) {
              const subAlerts = group.alerts;
              if (Array.isArray(subAlerts)) {
                for (const a of subAlerts) {
                  if (a.cities && Array.isArray(a.cities)) {
                    flat.push({
                      data: a.cities.join(', '),
                      alertDate: a.time ? new Date(a.time * 1000).toISOString() : '',
                      time: a.time,
                      threat: a.threat,
                      isDrill: a.isDrill || false,
                    });
                  }
                }
              } else if (group.data && typeof group.data === 'string') {
                flat.push(group);
              } else if (group.cities && Array.isArray(group.cities)) {
                flat.push({ data: group.cities.join(', '), time: group.time, threat: group.threat });
              }
            }
            return flat;
          }

          // Convert oref history format to our format
          function convertOrefAlerts(orefItems) {
            if (!Array.isArray(orefItems)) return [];
            const converted = [];
            for (const item of orefItems) {
              if (!item.data) continue;
              let unixTime = 0;
              if (item.alertDate) {
                const d = new Date(item.alertDate);
                if (!isNaN(d.getTime())) unixTime = Math.floor(d.getTime() / 1000);
              }
              if (!unixTime && item.date && item.time) {
                const parts = item.date.split('.');
                if (parts.length === 3) {
                  const isoStr = parts[2] + '-' + parts[1] + '-' + parts[0] + 'T' + item.time;
                  const d = new Date(isoStr);
                  if (!isNaN(d.getTime())) unixTime = Math.floor(d.getTime() / 1000);
                }
              }
              let threat = 0;
              const cat = Number(item.category);
              if (cat === 1) threat = 0;
              else if (cat === 2) threat = 1;
              else if (cat === 3) threat = 3;
              else if (cat === 4) threat = 4;
              else if (cat === 5) threat = 5;
              else if (cat === 6) threat = 6;
              else threat = 0;

              converted.push({
                data: item.data,
                alertDate: item.alertDate || '',
                time: unixTime,
                threat: threat,
                isDrill: false,
              });
            }
            return converted;
          }

          // Load existing accumulated data
          function loadFile(path) {
            try {
              if (fs.existsSync(path)) {
                const d = JSON.parse(fs.readFileSync(path, 'utf8'));
                return Array.isArray(d) ? d : [];
              }
            } catch {}
            return [];
          }

          // Merge new alerts into existing, deduplicate by time+data
          function mergeAlerts(existing, fresh) {
            const seen = new Set();
            const merged = [];
            for (const item of [...fresh, ...existing]) {
              const key = (item.time || '') + '|' + (item.data || '').slice(0, 60);
              if (seen.has(key)) continue;
              seen.add(key);
              merged.push(item);
            }
            merged.sort((a, b) => (b.time || 0) - (a.time || 0));
            return merged;
          }

          // Filter alerts by time range
          function filterByRange(alerts, fromTs, toTs) {
            return alerts.filter(a => {
              const t = a.time || 0;
              return t >= fromTs && t <= toTs;
            });
          }

          // Format date as DD.MM.YYYY for oref API
          function formatOrefDate(date) {
            const dd = String(date.getDate()).padStart(2, '0');
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const yyyy = date.getFullYear();
            return dd + '.' + mm + '.' + yyyy;
          }

          const now = new Date();
          const nowTs = Math.floor(now.getTime() / 1000);
          const dayAgoTs = nowTs - 86400;
          const twoDaysAgoTs = nowTs - 2 * 86400;

          (async () => {
            console.log('=== Fetching alerts at', now.toISOString(), '===');

            // ── Current Alert ────────────────────────────────────
            let cur = await fetchWithProxy(OREF_CURRENT);
            const hasCurrent = cur && cur?.data && cur.data.length > 0;
            fs.writeFileSync('data/current.json', JSON.stringify(hasCurrent ? cur : null));
            console.log('current:', hasCurrent ? 'ACTIVE ALERT' : 'no alert');

            // ── Fetch fresh data from Tzeva Adom ─────────────────
            let freshAlerts = [];
            try {
              console.log('Fetching Tzeva Adom API...');
              const raw = await tryFetch(TZEVA_ADOM_HISTORY, { timeout: 15000 });
              if (raw) {
                const items = Array.isArray(raw) ? raw : (raw.alerts || raw.data || []);
                freshAlerts = flattenTzeva(items);
                console.log('Tzeva Adom: got', freshAlerts.length, 'fresh alerts');
              }
            } catch(e) { console.log('Tzeva Adom error:', e.message); }

            // ── Backfill from oref GetAlarmsHistory (last 8 days) ──
            let orefAlerts = [];
            try {
              console.log('Backfilling from oref history API...');
              const backfillDays = 8;
              console.log('Backfilling', backfillDays, 'days from oref...');

              for (let i = 0; i < backfillDays; i++) {
                const d = new Date(now);
                d.setDate(d.getDate() - i);
                const dateStr = formatOrefDate(d);
                const url = OREF_HISTORY + '?lang=he&fromDate=' + dateStr + '&toDate=' + dateStr + '&mode=0';
                console.log('Fetching oref history for', dateStr, '...');
                const data = await fetchWithProxy(url);
                if (data && Array.isArray(data) && data.length > 0) {
                  const converted = convertOrefAlerts(data);
                  orefAlerts = orefAlerts.concat(converted);
                  console.log('  ->', data.length, 'alerts for', dateStr);
                } else {
                  console.log('  -> no data for', dateStr);
                }
                await new Promise(r => setTimeout(r, 500));
              }
              console.log('Oref backfill total:', orefAlerts.length, 'alerts');
            } catch(e) { console.log('Oref backfill error:', e.message); }

            // ── Load existing accumulated data ───────────────────
            const existingAll = loadFile('data/all.json');
            console.log('Existing accumulated alerts:', existingAll.length);

            // ── Merge all sources: fresh + oref backfill + existing ──
            const allAlerts = mergeAlerts(existingAll, [...freshAlerts, ...orefAlerts]);
            console.log('After merge:', allAlerts.length, 'total alerts');

            // Keep max 30 days of data (avoid infinite growth)
            const thirtyDaysAgoTs = nowTs - 30 * 86400;
            const trimmed = allAlerts.filter(a => (a.time || 0) >= thirtyDaysAgoTs);
            console.log('After trimming to 30 days:', trimmed.length);

            // ── Save accumulated data ────────────────────────────
            fs.writeFileSync('data/all.json', JSON.stringify(trimmed));

            // ── Split by periods ─────────────────────────────────
            const todayAlerts = filterByRange(trimmed, dayAgoTs, nowTs);
            const twoDaysAlerts = filterByRange(trimmed, twoDaysAgoTs, nowTs);

            fs.writeFileSync('data/today.json', JSON.stringify(todayAlerts));
            fs.writeFileSync('data/twodays.json', JSON.stringify(twoDaysAlerts));

            console.log('today (24h):', todayAlerts.length);
            console.log('twoDays (48h):', twoDaysAlerts.length);
            console.log('all:', trimmed.length);

            // ── Metadata ─────────────────────────────────────────
            const oldest = trimmed.length > 0 ? new Date((trimmed[trimmed.length-1].time || 0) * 1000).toISOString() : null;
            const newest = trimmed.length > 0 ? new Date((trimmed[0].time || 0) * 1000).toISOString() : null;

            fs.writeFileSync('data/meta.json', JSON.stringify({
              lastUpdate: now.toISOString(),
              totalAccumulated: trimmed.length,
              dataRange: { oldest, newest },
              counts: {
                today: todayAlerts.length,
                twoDays: twoDaysAlerts.length,
                all: trimmed.length,
              }
            }, null, 2));

            console.log('=== Done ===');
          })().then(() => process.exit(0)).catch(e => { console.error(e); process.exit(0); });
          "

      - name: Push data to alerts-data branch
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 alerts $(date -u '+%Y-%m-%d %H:%M')"
            git push origin alerts-data || git push --set-upstream origin alerts-data
          fi
