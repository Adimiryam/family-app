name: Fetch Alert Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch-alerts.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup alerts-data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin alerts-data 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/alerts-data; then
            git checkout alerts-data
          else
            echo "Creating orphan alerts-data branch"
            git checkout --orphan alerts-data
            git rm -rf . --quiet 2>/dev/null || true
          fi
          mkdir -p data

      - name: Fetch alerts from multiple sources
        run: |
          node -e "
          const fs = require('fs');

          // ── Sources ────────────────────────────────────────────
          const TZEVA_ADOM_HISTORY = 'https://api.tzevaadom.co.il/alerts-history';
          const OREF_CURRENT  = 'https://www.oref.org.il/warningMessages/alert/Alerts.json';
          const OREF_HISTORY  = 'https://www.oref.org.il/warningMessages/alert/History/AlertsHistory.json';
          const OREF_RANGE    = 'https://alerts-history.oref.org.il/Shared/Ajax/GetAlarmsHistory.aspx';

          const PROXIES = [
            url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
            url => 'https://corsproxy.io/?' + encodeURIComponent(url),
            url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
          ];

          const OREF_HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
            'Referer': 'https://www.oref.org.il/',
            'X-Requested-With': 'XMLHttpRequest',
            'Accept': 'application/json',
          };

          async function tryFetch(url, opts = {}) {
            try {
              const r = await fetch(url, { signal: AbortSignal.timeout(opts.timeout || 12000), ...opts });
              if (!r.ok) return null;
              const text = await r.text();
              if (!text || text.length < 2) return null;
              return JSON.parse(text);
            } catch (e) { return null; }
          }

          async function fetchWithProxy(url) {
            const direct = await tryFetch(url, { headers: OREF_HEADERS });
            if (direct) { console.log('DIRECT OK:', url.split('?')[0]); return direct; }
            console.log('DIRECT FAIL:', url.split('?')[0]);
            for (const proxy of PROXIES) {
              const data = await tryFetch(proxy(url), { timeout: 15000 });
              if (data) { console.log('PROXY OK:', url.split('?')[0]); return data; }
            }
            console.log('ALL PROXIES FAILED:', url.split('?')[0]);
            return null;
          }

          function dt(d) {
            return [String(d.getDate()).padStart(2,'0'), String(d.getMonth()+1).padStart(2,'0'), d.getFullYear()].join('.');
          }

          // Flatten nested tzevaadom format into oref-compatible flat array
          // Input:  [{id, alerts: [{time, cities: ['a','b'], threat, isDrill}]}]
          // Output: [{data: 'a, b', alertDate: '...', time, threat}]
          function flattenTzeva(items) {
            if (!Array.isArray(items)) return [];
            const flat = [];
            for (const group of items) {
              const subAlerts = group.alerts || group.data || [];
              if (!Array.isArray(subAlerts)) {
                // Already flat item — normalize
                if (group.cities && Array.isArray(group.cities)) {
                  flat.push({ data: group.cities.join(', '), time: group.time, threat: group.threat });
                } else if (group.data && typeof group.data === 'string') {
                  flat.push(group);
                }
                continue;
              }
              for (const alert of subAlerts) {
                if (alert.cities && Array.isArray(alert.cities)) {
                  const dateStr = alert.time ? new Date(alert.time * 1000).toISOString() : '';
                  flat.push({
                    data: alert.cities.join(', '),
                    alertDate: dateStr,
                    time: alert.time,
                    threat: alert.threat,
                    isDrill: alert.isDrill || false,
                  });
                }
              }
            }
            return flat;
          }

          const now = new Date();
          const yd = new Date(now - 864e5);
          const wk = new Date(now - 6 * 864e5);

          (async () => {
            console.log('=== Fetching alerts at', now.toISOString(), '===');

            // ── Current Alert ────────────────────────────────────
            let cur = await fetchWithProxy(OREF_CURRENT);
            const hasCurrent = cur && cur?.data && cur.data.length > 0;
            fs.writeFileSync('data/current.json', JSON.stringify(hasCurrent ? cur : null));
            console.log('current:', hasCurrent ? 'ACTIVE ALERT' : 'no alert');

            // ── Tzeva Adom alerts-history (globally accessible!) ─
            let tzevaFlat = [];
            try {
              console.log('Trying Tzeva Adom API...');
              const tzevaRaw = await tryFetch(TZEVA_ADOM_HISTORY, { timeout: 15000 });
              if (tzevaRaw) {
                console.log('TZEVA ADOM raw sample:', JSON.stringify(tzevaRaw).slice(0, 300));
                const rawItems = Array.isArray(tzevaRaw) ? tzevaRaw : (tzevaRaw.alerts || tzevaRaw.data || []);
                tzevaFlat = flattenTzeva(rawItems);
                console.log('TZEVA ADOM flattened:', tzevaFlat.length, 'alert records');
                if (tzevaFlat.length > 0) {
                  console.log('Sample flat item:', JSON.stringify(tzevaFlat[0]));
                }
              } else {
                console.log('TZEVA ADOM: no data returned');
              }
            } catch(e) { console.log('TZEVA ADOM ERROR:', e.message); }

            // ── Today (last 24h) ─────────────────────────────────
            let todayArr = [];
            if (tzevaFlat.length > 0) {
              todayArr = tzevaFlat;
              console.log('today: using flattened tzeva adom data,', todayArr.length, 'records');
            } else {
              const hist = await fetchWithProxy(OREF_HISTORY);
              todayArr = Array.isArray(hist) ? hist : [];
              console.log('today: oref,', todayArr.length, 'records');
            }
            fs.writeFileSync('data/today.json', JSON.stringify(todayArr));

            // ── Yesterday ────────────────────────────────────────
            const y = await fetchWithProxy(
              OREF_RANGE + '?lang=he&fromDate=' + dt(yd) + '&toDate=' + dt(yd) + '&mode=0'
            );
            const yesterdayArr = Array.isArray(y) ? y : [];
            fs.writeFileSync('data/yesterday.json', JSON.stringify(yesterdayArr));
            console.log('yesterday:', yesterdayArr.length, 'records');

            // ── Week ─────────────────────────────────────────────
            const w = await fetchWithProxy(
              OREF_RANGE + '?lang=he&fromDate=' + dt(wk) + '&toDate=' + dt(now) + '&mode=0'
            );
            const weekArr = Array.isArray(w) ? w : [];
            fs.writeFileSync('data/week.json', JSON.stringify(weekArr));
            console.log('week:', weekArr.length, 'records');

            // ── Since war start ──────────────────────────────────
            const sw = await fetchWithProxy(
              OREF_RANGE + '?lang=he&fromDate=28.02.2026&toDate=' + dt(now) + '&mode=0'
            );
            const sinceWarArr = Array.isArray(sw) ? sw : [];
            fs.writeFileSync('data/sincewar.json', JSON.stringify(sinceWarArr));
            console.log('sincewar:', sinceWarArr.length, 'records');

            // ── Metadata ─────────────────────────────────────────
            fs.writeFileSync('data/meta.json', JSON.stringify({
              lastUpdate: now.toISOString(),
              sources: {
                tzevaadom: tzevaFlat.length || 'failed',
              },
              counts: {
                today: todayArr.length,
                yesterday: yesterdayArr.length,
                week: weekArr.length,
                sinceWar: sinceWarArr.length,
              }
            }, null, 2));

            console.log('=== Done ===');
          })().then(() => process.exit(0)).catch(e => { console.error(e); process.exit(0); });
          "

      - name: Push data to alerts-data branch
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 alerts $(date -u '+%Y-%m-%d %H:%M')"
            git push origin alerts-data || git push --set-upstream origin alerts-data
          fi
