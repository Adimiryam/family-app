<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>משפחה שלנו</title>
  <script type="text/javascript">
    // Single Page App redirect for GitHub Pages
    // When GitHub Pages gets a 404, it serves this file.
    // We redirect to index.html, encoding the original path as a query param.
    var l = window.location;
    var base = '/family-app';
    var path = l.pathname.slice(base.length) || '/';
    l.replace(
      l.protocol + '//' + l.host + base + '/?p=' +
      encodeURIComponent(path) +
      (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
